version: '3.8'
services:
  mongodb:
    image: mongo:7
    ports: ["27017:27017"]
    volumes: [mongo_data:/data/db]
  backend:
    build: ./backend
    ports: ["4000:4000"]
    env_file: ./backend/.env
    depends_on: [mongodb]
  frontend:
    build: ./frontend
    ports: ["3000:3000"]
    env_file: ./frontend/.env.local
volumes:
  mongo_data: